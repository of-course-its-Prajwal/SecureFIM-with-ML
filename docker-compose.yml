version: "3.9"

services:
  # ── OpenSearch ──────────────────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.17.0
    container_name: securefim-opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=SecureFIM_2026!
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - securefim-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── OpenSearch Dashboards ──────────────────────────────────────────────
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.17.0
    container_name: securefim-dashboards
    environment:
      - 'OPENSEARCH_HOSTS=["http://opensearch:9200"]'
      - "DISABLE_SECURITY_DASHBOARDS_PLUGIN=true"
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - securefim-net

  # ── SecureFIM Server ───────────────────────────────────────────────────
  securefim-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: securefim-server
    ports:
      - "8443:8443"
    environment:
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8443
      - ML_MODEL_DIR=/app/models
      - LOG_LEVEL=INFO
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - securefim-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8443/api/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  opensearch-data:

networks:
  securefim-net:
    driver: bridge
